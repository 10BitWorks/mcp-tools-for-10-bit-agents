name: Umbrella — Build & Push (umbrella branch)

# Umbrella IT Group fork — see UMBRELLA_FORK.md.
# Builds and publishes the deployable line on every push to `umbrella`.
# Image lands at ghcr.io/umbrella-it-group/metamcp:<sha> + :latest.
# Watchtower on mcp-host-prod (scope=umbrella) picks up :latest within ~5 min.

on:
  push:
    branches:
      - umbrella
    # Only rebuild when something that actually feeds the Docker image
    # changes. Cross-checked against every Dockerfile COPY + the turbo
    # pipeline's globalDependencies (none outside apps/**, packages/**).
    # Docs (*.md, docs/**) are also .dockerignore'd, so they never touch
    # the build output either.
    paths:
      - "apps/**"
      - "packages/**"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".dockerignore"
      - ".github/workflows/umbrella-build.yml"
  pull_request:
    branches:
      - umbrella
    paths:
      - "apps/**"
      - "packages/**"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".dockerignore"
      - ".github/workflows/umbrella-build.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # NOTE: lint + check-types are intentionally not gated here. Upstream
  # `main` has pre-existing eslint warnings under `--max-warnings 0` and
  # a tRPC type error in apps/frontend/lib/trpc.ts that aren't caused by
  # our cherry-picks. Upstream itself only runs docker-publish on tags so
  # these never get noticed there. Tracked as a follow-up — see
  # UMBRELLA_FORK.md "Our own patches" backlog.
  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/umbrella'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=long

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          # mcp-host-prod is amd64-only; arm64 cross-build doubles CI time
          # for an artifact nothing consumes. Re-add if we ever publish for
          # a community arm64 host.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=metamcp-umbrella
          cache-to: type=gha,mode=max,scope=metamcp-umbrella

      - uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
